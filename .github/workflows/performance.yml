name: Performance

on:
  workflow_dispatch:
  schedule:
    # KST 월요일 새벽에 실행되도록 UTC 일요일에 둔다.
    - cron: "0 18 * * 0"
  push:
    branches: [main]
    paths:
      - ".github/workflows/performance.yml"
      - ".mise.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tools/perf/**"
      - "docs/performance-budget.md"
  pull_request:

concurrency:
  group: perf-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-performance-budget:
    name: core performance budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run install
      - run: mise run perf
      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-performance-artifacts
          path: artifacts/perf/**
          if-no-files-found: warn
          retention-days: 30
