[tools]
bun = "1.3.14"
node = "26.3.0"
rust = "1.96.0"

[env]
_.path = ["node_modules/.bin"]

[tasks.install]
description = "Install JavaScript tooling"
run = "bun install"

[tasks.fetch-references]
description = "Fetch local gitignored runtime references"
run = "sh tools/fetch-references.sh"

[tasks.sync-labels]
description = "Create or update the repository labels used by Iris PRs"
run = "sh tools/sync-labels.sh"

[tasks.fmt-js]
description = "Format JavaScript and TypeScript with Oxfmt"
run = "bunx oxfmt --write ."

[tasks.fmt-rust]
description = "Format Rust with the default rustfmt style"
run = "cargo fmt --all"

[tasks.fmt]
description = "Format all source files"
depends = ["fmt-js", "fmt-rust"]

[tasks.fmt-js-check]
description = "Check JavaScript and TypeScript formatting with Oxfmt"
run = "bunx oxfmt --check ."

[tasks.fmt-rust-check]
description = "Check Rust formatting with the default rustfmt style"
run = "cargo fmt --all --check"

[tasks.fmt-check]
description = "Check all source formatting"
depends = ["fmt-js-check", "fmt-rust-check"]

[tasks.lint]
description = "Lint JavaScript and TypeScript with Oxlint"
run = "bunx oxlint ."

[tasks.vp-check]
description = "Run Vite+ check"
run = "bunx vp check"

[tasks.rust-check]
description = "Check all Rust crates"
run = "cargo check --workspace --all-targets"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --workspace"

[tasks.rn-start]
description = "Start Metro for the React Native benchmark app"
run = "bun run --cwd apps/rn-bench start"

[tasks.rn-ios]
description = "Run the React Native benchmark app on iOS"
run = "bun run --cwd apps/rn-bench ios"

[tasks.rn-android]
description = "Run the React Native benchmark app on Android"
run = "bun run --cwd apps/rn-bench android"

[tasks.rn-android-build-debug]
description = "Build the React Native benchmark Android Hermes debug APK locally"
run = "cd apps/rn-bench/android && ./gradlew :app:assembleHermesDebug -x lint -x test"

[tasks.rn-android-build-release]
description = "Build the React Native benchmark Android Hermes release APK locally"
run = "cd apps/rn-bench/android && ./gradlew :app:assembleHermesRelease -x lint -x test"

[tasks.rn-android-build-hermes-bridge-release]
description = "Build the React Native benchmark Android Hermes plus Iris bridge release APK locally"
run = "cd apps/rn-bench/android && ./gradlew :app:assembleHermesBridgeRelease -x lint -x test"

[tasks.rn-android-build-iris-release]
description = "Build the React Native benchmark Android Iris release APK with a real Iris engine artifact"
run = "test -n \"$IRIS_ENGINE_AAR\" || { echo 'Set IRIS_ENGINE_AAR to a real Iris engine AAR before building irisRelease.' >&2; exit 1; }; cd apps/rn-bench/android && ./gradlew :app:assembleIrisRelease -PirisEngineAar=\"$IRIS_ENGINE_AAR\" -x lint -x test"

[tasks.rn-android-build-iris-engine]
description = "Build the Iris Android engine AAR skeleton"
run = "cd apps/rn-bench/android && ./gradlew :iris-engine:assembleRelease -x lint -x test"

[tasks.rn-android-build-iris-release-local]
description = "Build irisRelease with the local Iris Android engine AAR skeleton"
depends = ["rn-android-build-iris-engine"]
run = "cd apps/rn-bench/android && ./gradlew :app:assembleIrisRelease -PirisEngineAar=\"$(pwd)/iris-engine/build/outputs/aar/iris-engine-release.aar\" -x lint -x test"

[tasks.rn-android-build-engine-comparison]
description = "Build both Android release APKs for Hermes/Iris engine comparison"
depends = ["rn-android-build-release"]
run = "mise run rn-android-build-iris-release"

[tasks.rn-android-build-engine-comparison-local]
description = "Build Hermes release and local skeleton Iris release APKs for comparison preflight"
depends = ["rn-android-build-release"]
run = "mise run rn-android-build-iris-release-local"

[tasks.rn-ios-pods]
description = "Install CocoaPods dependencies for the React Native benchmark app"
run = "cd apps/rn-bench/ios && bundle install && bundle exec pod install"

[tasks.rn-ios-build-debug]
description = "Build the React Native benchmark iOS debug app locally"
run = "cd apps/rn-bench/ios && RCT_NO_LAUNCH_PACKAGER=1 xcodebuild -workspace IrisBench.xcworkspace -scheme IrisBench -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build"

[tasks.rn-ios-build-release]
description = "Build the React Native benchmark iOS release app locally"
run = "cd apps/rn-bench/ios && RCT_NO_LAUNCH_PACKAGER=1 xcodebuild -workspace IrisBench.xcworkspace -scheme IrisBench -configuration Release -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build"

[tasks.rn-typecheck]
description = "Type-check the React Native benchmark app"
run = "bun run --cwd apps/rn-bench typecheck"

[tasks.rn-test]
description = "Run the React Native benchmark app smoke test"
run = "bun run --cwd apps/rn-bench test --runInBand"

[tasks.rn-codegen]
description = "Generate React Native native codegen artifacts into artifacts/codegen/rn-bench"
run = "rm -rf artifacts/codegen/rn-bench && bun run --cwd apps/rn-bench react-native codegen --platform all --outputPath ../../artifacts/codegen/rn-bench"

[tasks.bench-js]
description = "Run the JavaScript benchmark harness and write artifacts/bench/js-baseline.json"
run = "bun run bench:js"

[tasks.bench-smoke]
description = "Run a short benchmark harness smoke test and write artifacts/bench/js-baseline-smoke.json"
run = "bun run bench:smoke"

[tasks.bench-qjs]
description = "Run the host-side Iris QuickJS backend microbenchmark"
run = "bun run bench:qjs"

[tasks.bench-qjs-smoke]
description = "Run a short host-side Iris QuickJS backend microbenchmark"
run = "bun run bench:qjs:smoke"

[tasks.bench-strict-hbc-engine-compare]
description = "Run host-side strict Hermes bytecode engine comparison for Hermes and Iris"
run = "bun run bench:strict-hbc-engine-compare"

[tasks.bench-strict-hbc-engine-compare-repeat]
description = "Run repeated host-side strict Hermes bytecode engine comparisons and summarize stability"
run = "bun run bench:strict-hbc-engine-compare:repeat"

[tasks.bench-strict-hbc-engine-compare-smoke]
description = "Run a short host-side strict Hermes bytecode engine comparison smoke test"
run = "bun run bench:strict-hbc-engine-compare:smoke"

[tasks.bench-strict-hbc-call-targets]
description = "Compare strict Hermes bytecode Math call target variants"
run = "bun run bench:strict-hbc-call-targets"

[tasks.bench-strict-hbc-compare-artifacts]
description = "Compare two existing strict HBC engine comparison artifacts"
run = "bun run bench:strict-hbc-compare-artifacts"

[tasks.bench-strict-hbc-compare-gate]
description = "Fail when a strict HBC candidate artifact regresses beyond the configured threshold"
run = "bun run bench:strict-hbc-compare-gate"

[tasks.bench-strict-hbc-global-access]
description = "Compare strict Hermes bytecode global property access against lexical locals"
run = "bun run bench:strict-hbc-global-access"

[tasks.bench-strict-hbc-math-lookup]
description = "Compare strict Hermes bytecode Math lookup-only variants"
run = "bun run bench:strict-hbc-math-lookup"

[tasks.bench-strict-hbc-profile]
description = "Profile host-side strict Hermes bytecode scalar executor hot paths"
run = "bun run bench:strict-hbc-profile"

[tasks.bench-strict-hbc-source-shape]
description = "Compare strict Hermes bytecode source-shape variants for global var and lexical bindings"
run = "bun run bench:strict-hbc-source-shape"

[tasks.bench-android-release]
description = "Build, install, run, and extract the Android physical release Hermes benchmark"
depends = ["rn-android-build-release"]
run = "bun run bench:android-release"

[tasks.bench-android-release-repeat]
description = "Run three Android physical release Hermes benchmark iterations and write a summary"
depends = ["rn-android-build-release"]
run = "bun run bench:android-release:repeat"

[tasks.bench-android-hermes-iris-bridge-local]
description = "Build, install, run, and extract the Android physical Hermes plus Iris bridge benchmark"
depends = ["rn-android-build-hermes-bridge-release"]
run = "bun run bench:android-hermes-iris-bridge"

[tasks.bench-android-engine-compare]
description = "Run Android physical release benchmarks for Hermes and Iris engine APKs"
depends = ["rn-android-build-engine-comparison"]
run = "bun run bench:android-engine-compare"

[tasks.bench-android-engine-compare-check]
description = "Validate Android Hermes/Iris comparison APKs use byte-identical HBC inputs"
run = "bun run bench:android-engine-compare:check"

[tasks.bench-android-engine-compare-local-check]
description = "Build local skeleton APKs and validate Android engine comparison inputs without running benchmarks"
depends = ["rn-android-build-engine-comparison-local"]
run = "bun run bench:android-engine-compare:check"

[tasks.bench-android-iris-hbc-gap-local]
description = "Print Iris scalar executor coverage for the local Iris release HBC bundle"
depends = ["rn-android-build-iris-release-local"]
run = "cargo run -p iris-hbc --bin hbc-gap -- apps/rn-bench/android/app/build/generated/assets/react/irisRelease/index.android.bundle"

[tasks.bench-android-iris-hbc-exec-local]
description = "Execute the local Iris release HBC bundle with the current Rust scalar executor subset"
depends = ["rn-android-build-iris-release-local"]
run = "cargo run -p iris-hbc --bin hbc-exec -- apps/rn-bench/android/app/build/generated/assets/react/irisRelease/index.android.bundle"

[tasks.bench-android-iris-hbc-trace-local]
description = "Trace the local Iris release HBC bundle to completion or the current scalar executor frontier"
depends = ["rn-android-build-iris-release-local"]
run = "cargo run -p iris-hbc --bin hbc-trace -- apps/rn-bench/android/app/build/generated/assets/react/irisRelease/index.android.bundle"

[tasks.bench-android-iris-bootstrap-local]
description = "Build, install, run, and extract the Android physical Iris HBC bootstrap benchmark"
depends = ["rn-android-build-iris-release-local"]
run = "bun run bench:android-iris-bootstrap"

[tasks.bench-android-iris-qjs-local]
description = "Build, install, run, and extract the Android physical Iris QuickJS backend microbenchmark"
depends = ["rn-android-build-iris-release-local"]
run = "bun run bench:android-iris-qjs"

[tasks.bench-android-local-performance]
description = "Build local Android release variants, measure Hermes release and Iris bootstrap, and write a combined no-ratio report"
depends = ["rn-android-build-engine-comparison-local"]
run = "bun run bench:android-local-performance"

[tasks.bench-android-local-performance-report]
description = "Write a combined Android local performance report from existing Hermes and Iris summaries"
run = "bun run bench:android-local-performance-report"

[tasks.bench-android-runtime-lanes-local]
description = "Measure current Android runtime comparison lanes and write the three-lane report"
depends = [
  "rn-android-build-release",
  "rn-android-build-hermes-bridge-release",
  "rn-android-build-iris-release-local",
]
run = "bun run bench:android-runtime-lanes-local"

[tasks.bench-android-runtime-lanes-report]
description = "Write the Android three-lane runtime comparison report from existing summaries"
run = "bun run bench:android-runtime-lanes-report"

[tasks.bench-extract-hermes]
description = "Extract a Hermes app benchmark report from artifacts/bench/metro-hermes.log"
run = "bun run bench:extract-hermes --input=artifacts/bench/metro-hermes.log --output=artifacts/bench/hermes-baseline.json"

[tasks.bench-extract-fixture]
description = "Validate Hermes benchmark log extraction with a local fixture"
run = "bun run bench:extract-hermes:fixture"

[tasks.bench-extract-android-release-fixture]
description = "Validate Android release Hermes benchmark log extraction with a local fixture"
run = "bun run bench:extract-hermes:android-release-fixture"

[tasks.bench-extract-hermes-release]
description = "Extract a release Hermes app benchmark report from artifacts/bench/rn-release-hermes.log"
run = "bun run bench:extract-hermes:release --input=artifacts/bench/rn-release-hermes.log --output=artifacts/bench/hermes-release-baseline.json"

[tasks.bench-extract-release-fixture]
description = "Validate release Hermes benchmark log extraction with a local fixture"
run = "bun run bench:extract-hermes:release-fixture"

[tasks.perf]
description = "Run the core performance budget gate"
run = "sh tools/perf/core-budget.sh"

[tasks.check]
description = "Run formatting, lint, Rust checks, and tests"
depends = ["fmt-check", "lint", "rust-check", "test", "rn-typecheck", "rn-test"]
