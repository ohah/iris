[tools]
bun = "1.3.14"
node = "26.3.0"
rust = "1.96.0"

[env]
_.path = ["node_modules/.bin"]

[tasks.install]
description = "Install JavaScript tooling"
run = "bun install"

[tasks.fetch-references]
description = "Fetch local gitignored runtime references"
run = "sh tools/fetch-references.sh"

[tasks.sync-labels]
description = "Create or update the repository labels used by Iris PRs"
run = "sh tools/sync-labels.sh"

[tasks.fmt-js]
description = "Format JavaScript and TypeScript with Oxfmt"
run = "bunx oxfmt --write ."

[tasks.fmt-rust]
description = "Format Rust with the default rustfmt style"
run = "cargo fmt --all"

[tasks.fmt]
description = "Format all source files"
depends = ["fmt-js", "fmt-rust"]

[tasks.fmt-js-check]
description = "Check JavaScript and TypeScript formatting with Oxfmt"
run = "bunx oxfmt --check ."

[tasks.fmt-rust-check]
description = "Check Rust formatting with the default rustfmt style"
run = "cargo fmt --all --check"

[tasks.fmt-check]
description = "Check all source formatting"
depends = ["fmt-js-check", "fmt-rust-check"]

[tasks.lint]
description = "Lint JavaScript and TypeScript with Oxlint"
run = "bunx oxlint ."

[tasks.vp-check]
description = "Run Vite+ check"
run = "bunx vp check"

[tasks.rust-check]
description = "Check all Rust crates"
run = "cargo check --workspace --all-targets"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --workspace"

[tasks.rn-start]
description = "Start Metro for the React Native benchmark app"
run = "bun run --cwd apps/rn-bench start"

[tasks.rn-ios]
description = "Run the React Native benchmark app on iOS"
run = "bun run --cwd apps/rn-bench ios"

[tasks.rn-android]
description = "Run the React Native benchmark app on Android"
run = "bun run --cwd apps/rn-bench android"

[tasks.rn-typecheck]
description = "Type-check the React Native benchmark app"
run = "bun run --cwd apps/rn-bench typecheck"

[tasks.rn-test]
description = "Run the React Native benchmark app smoke test"
run = "bun run --cwd apps/rn-bench test --runInBand"

[tasks.bench-js]
description = "Run the JavaScript benchmark harness and write artifacts/bench/js-baseline.json"
run = "bun run bench:js"

[tasks.bench-smoke]
description = "Run a short benchmark harness smoke test and write artifacts/bench/js-baseline-smoke.json"
run = "bun run bench:smoke"

[tasks.bench-extract-hermes]
description = "Extract a Hermes app benchmark report from artifacts/bench/metro-hermes.log"
run = "bun run bench:extract-hermes --input=artifacts/bench/metro-hermes.log --output=artifacts/bench/hermes-baseline.json"

[tasks.bench-extract-fixture]
description = "Validate Hermes benchmark log extraction with a local fixture"
run = "bun run bench:extract-hermes:fixture"

[tasks.perf]
description = "Run the core performance budget gate"
run = "sh tools/perf/core-budget.sh"

[tasks.check]
description = "Run formatting, lint, Rust checks, and tests"
depends = ["fmt-check", "lint", "rust-check", "test", "rn-typecheck", "rn-test"]
