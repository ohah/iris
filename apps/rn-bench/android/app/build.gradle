apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    hermesCommand = file("../../node_modules/hermes-compiler/hermesc/%OS-BIN%/hermesc").absolutePath
    enableHermesOnlyInVariants = ["hermesDebug", "hermesDebugOptimized", "hermesRelease", "hermesBridgeDebug", "hermesBridgeDebugOptimized", "hermesBridgeRelease", "irisRelease"]
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

def irisEngineAar = providers.gradleProperty("irisEngineAar")

androidComponents {
    beforeVariants(selector().all()) { variant ->
        def isIrisVariant = variant.productFlavors.any { flavor ->
            flavor.second == "iris"
        }

        if (isIrisVariant && !irisEngineAar.isPresent()) {
            variant.enable = false
        }
    }
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.iris.bench"
    defaultConfig {
        applicationId "com.iris.bench"
        manifestPlaceholders["appLabel"] = "IrisBench"
        manifestPlaceholders["mainApplicationName"] = "com.iris.bench.MainApplication"
        manifestPlaceholders["mainActivityName"] = "com.iris.bench.MainActivity"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    flavorDimensions "engine"
    productFlavors {
        hermes {
            dimension "engine"
            applicationId "com.iris.bench.hermes"
            manifestPlaceholders["appLabel"] = "IrisBench Hermes"
            manifestPlaceholders["mainApplicationName"] = "com.iris.bench.hermes.MainApplication"
            manifestPlaceholders["mainActivityName"] = "com.iris.bench.hermes.MainActivity"
            buildConfigField "String", "IRIS_ENGINE_FLAVOR", "\"hermes\""
            buildConfigField "String", "IRIS_RUNTIME_BACKEND", "\"rn-hermes\""
        }
        hermesBridge {
            dimension "engine"
            applicationId "com.iris.bench.hermesbridge"
            manifestPlaceholders["appLabel"] = "IrisBench Hermes Bridge"
            manifestPlaceholders["mainApplicationName"] = "com.iris.bench.hermesbridge.MainApplication"
            manifestPlaceholders["mainActivityName"] = "com.iris.bench.hermesbridge.MainActivity"
            buildConfigField "String", "IRIS_ENGINE_FLAVOR", "\"hermes-iris-bridge\""
            buildConfigField "String", "IRIS_RUNTIME_BACKEND", "\"iris-hermes-jsi-bridge\""
        }
        iris {
            dimension "engine"
            applicationId "com.iris.bench.iris"
            manifestPlaceholders["appLabel"] = "IrisBench Iris"
            manifestPlaceholders["mainApplicationName"] = "com.iris.bench.iris.MainApplication"
            manifestPlaceholders["mainActivityName"] = "com.iris.bench.iris.MainActivity"
            buildConfigField "String", "IRIS_ENGINE_FLAVOR", "\"iris\""
            buildConfigField "String", "IRIS_RUNTIME_BACKEND", "\"iris-qjs\""
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    hermesImplementation("com.facebook.react:hermes-android")
    hermesBridgeImplementation("com.facebook.react:hermes-android")
    hermesBridgeImplementation(project(":iris-bridge"))

    if (irisEngineAar.isPresent()) {
        def irisEngineAarFile = file(irisEngineAar.get())

        if (!irisEngineAarFile.exists()) {
            throw new GradleException("irisEngineAar does not exist: ${irisEngineAarFile}")
        }

        irisImplementation(files(irisEngineAarFile))
    }
}
